services:
  cie-verona:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POLL_INTERVAL: 15s
    volumes:
      - cie-data:/data

  sendtest:
    build: .
    entrypoint: ["/sendtest"]
    env_file: .env
    volumes:
      - cie-data:/data
    profiles:
      - tools

volumes:
  cie-data:
